{% set version = "1.2.0" %}
{% set github = "https://github.com/yaarilab/piglet" %}

package:
  name: r-piglet
  version: {{ version }}

source:
  url: {{ github }}/archive/refs/tags/v{{ version }}.tar.gz
  # Alternatively, use direct GitHub:
  # git_url: {{ github }}
  # git_tag: v{{ version }}

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  run_exports:
    - {{ pin_subpackage('r-piglet', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - make
  host:
    - r-base >=3.5.0
    - r-rcpp >=0.11.0
    - r-data.table >=1.12.2
    - r-ggplot2 >=3.3.6
    - r-r6 >=2.5.1
    - r-jsonlite >=1.8.3
    - r-magrittr
    - r-rlang >=0.4.0
    - r-rcolorbrewer >=1.1.2
    - r-circlize >=0.4.15
    - r-dendextend >=1.9.0
    - r-igraph >=1.3.0
    - r-stringdist >=0.9.0
    - r-cluster >=2.1.0
    - r-ape >=5.0
    - bioconductor-biostrings >=2.62.0
    - bioconductor-decipher >=2.22.0
    # These are from the immcantation ecosystem
    - r-alakazam >=1.2.0
    - r-tigger >=1.0.0
    - r-zen4r >=0.7
  run:
    - r-base >=3.5.0
    - r-rcpp >=0.11.0
    - r-data.table >=1.12.2
    - r-ggplot2 >=3.3.6
    - r-r6 >=2.5.1
    - r-jsonlite >=1.8.3
    - r-magrittr
    - r-rlang >=0.4.0
    - r-rcolorbrewer >=1.1.2
    - r-circlize >=0.4.15
    - r-dendextend >=1.9.0
    - r-igraph >=1.3.0
    - r-stringdist >=0.9.0
    - r-cluster >=2.1.0
    - r-ape >=5.0
    - bioconductor-biostrings >=2.62.0
    - bioconductor-decipher >=2.22.0
    - r-alakazam >=1.2.0
    - r-tigger >=1.0.0
    - r-zen4r >=0.7

test:
  commands:
    - $R -e "library('piglet')"
    - $R -e "data(HVGERM, package='piglet')"

about:
  home: {{ github }}
  license: CC-BY-SA-4.0
  license_family: CC
  license_file: LICENSE
  summary: Program for Inferring Immunoglobulin Allele Similarity Clusters and Genotypes
  description: |
    PIgLET (Program for Ig clusters) improves genotype inference and downstream
    Adaptive Immune Receptor Repertoire Sequence (AIRR-seq) data analysis.
    The package provides allele similarity clusters (ASC) to reduce ambiguity
    within immunoglobulin alleles, and allele-based genotype inference.
    Supports both hierarchical clustering and Leiden community detection
    for V, D, and J segments.
  doc_url: https://yaarilab.github.io/piglet/
  dev_url: {{ github }}

extra:
  recipe-maintainers:
    - ayeletperes
  identifiers:
    - doi:10.1093/nar/gkad603
